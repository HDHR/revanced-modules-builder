enable-magisk-update = true
parallel-jobs = 1

[YouTube]
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"
build-mode = "module"
excluded-patches = "'Custom branding' 'GmsCore support'"

[Music]
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"
arch = "arm64-v8a"
build-mode = "module"
excluded-patches = "'Custom branding' 'GmsCore support'"

[Strava]
apkmirror-dlurl = "https://www.apkmirror.com/apk/strava-inc/strava-run-bike-hike-2"
uptodown-dlurl = "https://strava.en.uptodown.com/android"
build-mode = "module"
excluded-patches = "'Add 'Give Kudos' button to 'Group Activity'' 'Overwrite media upload parameters' 'Enable password login' 'Disable Quick Edit'"
patcher-args = "-e 'Hide distractions' -Oupselling=true -Opromo=true"

[Duolingo]
apkmirror-dlurl = "https://www.apkmirror.com/apk/duolingo/duolingo-duolingo"
uptodown-dlurl = "https://duolingo.en.uptodown.com/android"
build-mode = "module"

[Twitter]
apkmirror-dlurl = "https://www.apkmirror.com/apk/x-corp/twitter"
uptodown-dlurl = "https://twitter.en.uptodown.com/android"
build-mode = "module"
included-patches = "'Unlock downloads' 'Hide ads' 'Sanitize sharing links'"
exclusive-patches = true
